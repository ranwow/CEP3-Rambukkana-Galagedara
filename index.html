<head>

<title>NBRI Borehole Map - CEP3 - Rambukkana - Galagedara Section</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
  :root{
    --ink:#1c2b2a;
    --paper:#f6f4ee;
    --line:#d8d2c2;
    --accent:#2f6f5e;
    --accent-2:#b3541e;
    --panel:#ffffff;

  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    font-family:'Segoe UI',ui-sans-serif,system-ui,sans-serif;
    background:var(--paper);
    color:var(--ink);
    display:flex;
    flex-direction:column;
  }
  header{
    background:var(--ink);
    color:var(--paper);
    padding:14px 20px;
    display:flex;
    align-items:baseline;
    gap:14px;
    flex-wrap:wrap;
    border-bottom:3px solid var(--accent-2);
  }
  #sidebar-toggle{
    background:transparent;
    border:1px solid #4a5a58;
    color:var(--paper);
    border-radius:6px;
    width:32px;
    height:32px;
    font-size:16px;
    line-height:1;
    cursor:pointer;
    flex-shrink:0;
    align-self:center;

  #sidebar-toggle:hover{

  header h1{

    letter-spacing:0.02em;

  #status-line{

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

/* ============================================================
   CONFIG
   ============================================================ */
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS8PKkh7RDdd1g5boTWjdryadGLVhDkvKUMEjScApNAeWA7TrPrcetA1YiccjQvhPfnZ8ewg1NQugfv/pub?output=csv";
const AUTO_REFRESH_MS = 5 * 60 * 1000;

proj4.defs("EPSG:5235", "+proj=tmerc +lat_0=7.000480277777778 +lon_0=80.77171308333334 +k=0.9999238418 +x_0=500000 +y_0=500000 +ellps=evrst30 +towgs84=-0.293,766.95,87.713,0.195704,1.69507,3.47302,-0.039338 +units=m +no_defs");

const STATUS_COLORS = {
  "Completed": "#2f6f5e",
  "Cancelled": "#c0523f",
  "Ongoing": "#b3541e",
  "In Progress": "#b3541e",
  "Planned": "#8a8370",
  "Pending": "#c9a227",
  "default": "#4c6a72"
};

const map = L.map('map', { zoomControl: true }).setView([7.45, 80.6], 12);

const baseLayers = {
  "Street": L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '&copy; OpenStreetMap contributors' }),
  "Satellite": L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19, attribution: 'Tiles &copy; Esri &mdash; Source: Esri, Maxar, Earthstar Geographics' }),
  "Hybrid": L.layerGroup([
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19, attribution: 'Tiles &copy; Esri &mdash; Source: Esri, Maxar, Earthstar Geographics' }),
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19, attribution: 'Labels &copy; Esri' })
  ]),
  "Terrain": L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { maxZoom: 17, attribution: 'Map data: &copy; OpenStreetMap contributors, SRTM &mdash; Style: &copy; OpenTopoMap (CC-BY-SA)' })
};

baseLayers["Street"].addTo(map);
const layersControl = L.control.layers(baseLayers, {}, {
  position: 'topright',
  collapsed: window.matchMedia('(max-width: 768px)').matches
}).addTo(map);

const markersLayer = L.layerGroup();
map.addLayer(markersLayer);

const LABEL_MIN_ZOOM = 18;

function updateLabelVisibility(){
  const zoom = map.getZoom();
  const mapDiv = document.getElementById('map');
  mapDiv.classList.toggle('show-pkg-labels', zoom >= 12 && zoom < LABEL_MIN_ZOOM);
  mapDiv.classList.toggle('show-bh-labels', zoom >= LABEL_MIN_ZOOM);
}
map.on('zoomend', updateLabelVisibility);

let allRows = [];
let markers = [];

function setStatus(text, cls) {
  document.getElementById('status-text').textContent = text;
  const dot = document.getElementById('status-dot');
  dot.className = '';
  if (cls) dot.classList.add(cls);
}

function toNum(v){
  if (v === undefined || v === null) return null;
  const s = String(v).trim();
  if (s === '' || s === '-') return null;
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}

function convertToLatLon(easting, northing){
  try {
    const [lon, lat] = proj4('EPSG:5235', 'WGS84', [easting, northing]);
    return { lat, lon };
  } catch(e){
    return null;
  }
}

function colorFor(status){
  return STATUS_COLORS[status] || STATUS_COLORS.default;
}

function makeIcon(status) {
  const color = colorFor(status);
  const opacity = (status === "Cancelled") ? "0.5" : "1.0";
  return L.divIcon({
    className: '',
    html: `<div style="width: 14px; height: 14px; border-radius: 50%; background: ${color}; border: 2px solid #ffffff; box-shadow: 0 0 0 2px ${color}, 0 2px 5px rgba(0,0,0,0.4); opacity: ${opacity}; transition: transform 0.15s ease-in-out;"></div>`,
    iconSize: [18, 18],
    iconAnchor: [9, 9],
    popupAnchor: [0, -9]
  });
}

/* ============================================================
   CANVAS BOREHOLE LOG GENERATOR
   ============================================================ */
function drawBoreholeLog(canvasId, elevation, termDepth, rockCoring, gwLevel) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  
  const w = canvas.width;
  const h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  
  // Clean values
  const el = toNum(elevation) || 0.0;
  const td = toNum(termDepth) || 0.0;
  const rc = toNum(rockCoring) || 0.0;
  const gw = toNum(gwLevel);
  
  // Layer Math
  const overburdenThickness = Math.max(0, td - rc);
  const rockLevelMsl = el - overburdenThickness;
  const termLevelMsl = el - td;
  
  // Scaled coordinates mapping (leave margins for structural labels)
  const topY = 20;
  const bottomY = h - 20;
  const availableH = bottomY - topY;
  
  let overburdenY = bottomY;
  if (td > 0) {
    overburdenY = topY + (overburdenThickness / td) * availableH;
  }
  
  const colX = 80;
  const colW = 40;
  
  // 1. Render Overburden Stratum (Soil)
  if (overburdenThickness > 0) {
    ctx.fillStyle = '#e3d2be';
    ctx.fillRect(colX, topY, colW, overburdenY - topY);
    // Soil pattern lines
    ctx.strokeStyle = '#c4b099';
    ctx.lineWidth = 1;
    for (let y = topY + 6; y < overburdenY; y += 12) {
      ctx.beginPath(); ctx.moveTo(colX + 4, y); ctx.lineTo(colX + 12, y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(colX + 20, y + 4); ctx.lineTo(colX + 28, y + 4); ctx.stroke();
    }
  }
  
  // 2. Render Bedrock Stratum
  if (rc > 0) {
    ctx.fillStyle = '#cbd5e1';
    ctx.fillRect(colX, overburdenY, colW, bottomY - overburdenY);
    // Rock hatch pattern (45 degree cross-hatch marks)
    ctx.strokeStyle = '#94a3b8';
    ctx.lineWidth = 1;
    for (let y = overburdenY + 4; y < bottomY; y += 14) {
      ctx.beginPath(); ctx.moveTo(colX, y); ctx.lineTo(colX + 12, y - 6); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(colX + 15, y + 6); ctx.lineTo(colX + 30, y - 1); ctx.stroke();
    }
  }
  
  // Draw Central Borehole Shaft Lines
  ctx.strokeStyle = '#475569';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(colX, topY); ctx.lineTo(colX, bottomY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(colX + colW, topY); ctx.lineTo(colX + colW, bottomY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(colX, topY); ctx.lineTo(colX + colW, topY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(colX, bottomY); ctx.lineTo(colX + colW, bottomY); ctx.stroke();
  
  // 3. Render Groundwater Table indicator
  if (gw !== null && gw >= 0 && gw <= td) {
    let gwY = topY;
    if (td > 0) gwY = topY + (gw / td) * availableH;
    
    ctx.strokeStyle = '#2563eb';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 3]);
    ctx.beginPath(); ctx.moveTo(colX - 15, gwY); ctx.lineTo(colX + colW + 15, gwY); ctx.stroke();
    ctx.setLineDash([]);
    
    // Draw water triangle
    ctx.fillStyle = '#2563eb';
    ctx.beginPath();
    ctx.moveTo(colX - 8, gwY); ctx.lineTo(colX - 2, gwY); ctx.lineTo(colX - 5, gwY + 5);
    ctx.closePath(); ctx.fill();
    
    ctx.font = '9px sans-serif';
    ctx.fillText(`GWL: ${gw.toFixed(2)}m`, colX + colW + 18, gwY + 3);
  }
  
  // 4. Text Annotations & Callouts
  ctx.fillStyle = '#1e293b';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'right';
  
  // Top Ground Level elevation
  ctx.fillText(`${el.toFixed(2)} m`, colX - 8, topY + 4);
  ctx.font = '9px sans-serif';
  ctx.fillStyle = '#64748b';
  ctx.fillText('GL', colX - 8, topY + 14);
  
  // Rock Level Boundary line marker
  if (overburdenThickness > 0 && rc > 0) {
    ctx.strokeStyle = '#475569';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(colX - 5, overburdenY); ctx.lineTo(colX, overburdenY); ctx.stroke();
    ctx.fillStyle = '#1e293b';
    ctx.font = '10px sans-serif';
    ctx.fillText(`${rockLevelMsl.toFixed(2)} m`, colX - 8, overburdenY + 4);
    ctx.font = '9px sans-serif';
    ctx.fillStyle = '#b3541e';
    ctx.fillText(`Rock @ ${overburdenThickness.toFixed(2)}m`, colX - 8, overburdenY + 14);
  }
  
  // Termination Level line marker
  ctx.strokeStyle = '#475569';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(colX - 5, bottomY); ctx.lineTo(colX, bottomY); ctx.stroke();
  ctx.fillStyle = '#1e293b';
  ctx.font = '10px sans-serif';
  ctx.fillText(`${termLevelMsl.toFixed(2)} m`, colX - 8, bottomY + 4);
  ctx.font = '9px sans-serif';
  ctx.fillStyle = '#64748b';
  ctx.fillText(`Term: ${td.toFixed(2)}m`, colX - 8, bottomY + 14);
  
  // Thickness Labels plotted directly inside the layers
  ctx.textAlign = 'center';
  ctx.font = 'bold 9px sans-serif';
  if (overburdenThickness > 0) {
    ctx.fillStyle = '#5c4d3c';
    ctx.fillText(`${overburdenThickness.toFixed(1)}m`, colX + (colW / 2), topY + ((overburdenY - topY) / 2) + 3);
  }
  if (rc > 0) {
    ctx.fillStyle = '#334155';
    ctx.fillText(`${rc.toFixed(1)}m`, colX + (colW / 2), overburdenY + ((bottomY - overburdenY) / 2) + 3);
  }
}

function popupHtml(row){
  const status = row['Status'] || '';
  const name = row['BH Name'] || 'Unnamed BH';
  
  const el = toNum(row['Elevation']);
  const td = toNum(row['Termination Depth']);
  const rc = toNum(row['Rock Coring']);
  const gw = toNum(row['Groundwater Level']);
  
  // Compute descriptive Rock Level mapping fields
  let rockLevelStr = '-';
  if (el !== null && td !== null && rc !== null) {
    const overburden = td - rc;
    const rockLevelMsl = el - overburden;
    rockLevelStr = `${rockLevelMsl.toFixed(3)} m MSL (Depth: ${overburden.toFixed(2)}m)`;
  }

  const rows = [
    ['Easting', row['Easting']],
    ['Northing', row['Northing']],
    ['Elevation (m MSL)', row['Elevation']],
    ['Contractor', row['Contractor Done'] || row['Contractor']],
    ['Difficulty', row['Difficulty']],
    ['Lot', row['Lot']],
    ['Package', row['Package']],
    ['Commence Date', row['Commence Date']],
    ['Completed Date', row['Completed Date']],
    ['Rock Level', rockLevelStr],
    ['Termination Depth (m)', row['Termination Depth']],
    ['Groundwater Level (m)', row['Groundwater Level']],
  ].filter(([k,v]) => v !== undefined && v !== null && String(v).trim() !== '' && String(v).trim() !== '-');

  const tableRows = rows.map(([k,v]) => `<tr><td class="k">${k}</td><td>: ${v}</td></tr>`).join('');
  const pdfUrl = (row['PDF Link'] || row['Log PDF'] || row['Borehole Log'] || '').trim();
  const pdfButton = pdfUrl ? `<a href="${pdfUrl}" target="_blank" rel="noopener" class="pdf-link-btn">&#128196; View Full Borehole Log</a>` : '';

  // Generate a distinct unique ID tag for the inline diagram canvas instance
  const canvasId = `bh_canvas_${name.replace(/[^a-zA-Z0-9]/g, '_')}`;

  return `
    <div class="popup-title">${name}</div>
    <span class="status-pill" style="background:${colorFor(status)}">${status || 'Unknown'}</span>
    <table class="popup-table">${tableRows}</table>
    <div class="log-container">
      <div class="log-title">Strata Sketch Profile</div>
      <canvas id="${canvasId}" class="bh-canvas" width="240" height="150"></canvas>
    </div>
    ${pdfButton}
  `;
}

function populateSelect(id, values){
  const el = document.getElementById(id);
  const current = el.value;
  el.innerHTML = '<option value="">All</option>' + values.map(v => `<option value="${v}">${v}</option>`).join('');
  if (values.includes(current)) el.value = current;
}

function buildLegend(rows){
  const counts = {};
  rows.forEach(r => {
    const s = (r['Status'] || 'Unknown').trim() || 'Unknown';
    counts[s] = (counts[s] || 0) + 1;
  });
  const statuses = Object.keys(counts).sort();
  const el = document.getElementById('legend');
  el.innerHTML = statuses.map(s => `
    <div class="legend-item">
      <span class="swatch" style="background:${colorFor(s)}"></span>
      <span>${s}</span>
      <span class="legend-count">${counts[s]}</span>
    </div>`).join('') + `
    <div class="legend-item" style="border-top:1px solid var(--line); padding-top:6px; margin-top:2px; font-weight:600;">
      <span>Total</span>
      <span class="legend-count">${rows.length}</span>
    </div>`;
}

function render(){
  const searchTerm = document.getElementById('search').value.trim().toLowerCase();
  const fStatus = document.getElementById('f-status').value;
  const fContractor = document.getElementById('f-contractor').value;
  const fLot = document.getElementById('f-lot').value;
  const fPackage = document.getElementById('f-package').value;

  markersLayer.clearLayers();
  markers = [];

  let shown = 0;
  const bounds = [];
  const labeledPackages = new Set();

  allRows.forEach(row => {
    const status = row['Status'] || '';
    const contractor = row['Contractor Done'] || row['Contractor'] || '';
    const lot = row['Lot'] || '';
    const pkg = row['Package'] || '';
    const name = row['BH Name'] || '';

    if (fStatus && status !== fStatus) return;
    if (fContractor && contractor !== fContractor) return;
    if (fLot && lot !== fLot) return;
    if (fPackage && pkg !== fPackage) return;
    if (searchTerm){
      const hay = `${name} ${lot} ${pkg} ${contractor}`.toLowerCase();
      if (!hay.includes(searchTerm)) return;
    }

    const e = toNum(row['Easting']);
    const n = toNum(row['Northing']);
    if (e === null || n === null) return;

    const ll = convertToLatLon(e, n);
    if (!ll) return;

    const marker = L.marker([ll.lat, ll.lon], { icon: makeIcon(status) });
    marker.bindPopup(popupHtml(row));
    
    // Attach listener to render the canvas drawing after Leaflet adds the HTML element to the DOM
    marker.on('popupopen', (e) => {
      const canvasId = `bh_canvas_${name.replace(/[^a-zA-Z0-9]/g, '_')}`;
      drawBoreholeLog(
        canvasId, 
        row['Elevation'], 
        row['Termination Depth'], 
        row['Rock Coring'], 
        row['Groundwater Level']
      );
    });
    
    const cleanPkgName = pkg.trim();
    if (cleanPkgName && !labeledPackages.has(cleanPkgName)) {
      marker.bindTooltip(`📦 ${cleanPkgName}`, { permanent: true, direction: 'top', offset: [0, -9], className: 'pkg-label' });
      labeledPackages.add(cleanPkgName);
    } else {
      marker.bindTooltip(name, { permanent: true, direction: 'top', offset: [0, -9], className: 'bh-label' });
    }

    markersLayer.addLayer(marker);
    bounds.push([ll.lat, ll.lon]);
    shown++;
  });

  document.getElementById('count').textContent = `${shown} of ${allRows.length} boreholes shown`;

  if (bounds.length && !window.hasInitialZoomed){
    map.fitBounds(bounds, { padding: [40,40], maxZoom: 16 });
    window.hasInitialZoomed = true;
  }
  updateLabelVisibility();
}

function uniqueVals(rows, key){
  return [...new Set(rows.map(r => (r[key] || '').trim()).filter(v => v))].sort();
}

function loadRows(rows){
  allRows = rows.filter(r => r['BH Name'] && r['BH Name'].trim());
  populateSelect('f-status', uniqueVals(allRows, 'Status'));
  populateSelect('f-contractor', uniqueVals(allRows, 'Contractor Done').length ? uniqueVals(allRows,'Contractor Done') : uniqueVals(allRows,'Contractor'));
  populateSelect('f-lot', uniqueVals(allRows, 'Lot'));
  populateSelect('f-package', uniqueVals(allRows, 'Package'));
  buildLegend(allRows);
  render();
}

function fetchData(){
  if (SHEET_CSV_URL){
    setStatus('Refreshing from Google Sheet…');
    Papa.parse(SHEET_CSV_URL, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: (results) => {
        loadRows(results.data);
        setStatus('Live — synced ' + new Date().toLocaleTimeString(), 'ok');
      },
      error: (err) => {
        console.error(err);
        setStatus('Could not reach sheet — parsing error', 'err');
      }
    });
  }
}

document.getElementById('search').addEventListener('input', render);
['f-status','f-contractor','f-lot','f-package'].forEach(id =>
  document.getElementById(id).addEventListener('change', render)
);

fetchData();
if (SHEET_CSV_URL && AUTO_REFRESH_MS > 0){
  setInterval(fetchData, AUTO_REFRESH_MS);
}

/* ============================================================
   OVERLAY ENGINE
   ============================================================ */
function styleForOverlayFeature(feature){
  return { color: '#2b6cb0', weight: 1.9, opacity: 0.95, fillColor: '#2b6cb0', fillOpacity: 0.15 };
}

let overlayCount = 0;
function addOverlayLayer(name, geojson, fitToBounds){
  if (fitToBounds === undefined) fitToBounds = true;
  let layer = L.geoJSON(geojson, {
    style: styleForOverlayFeature,
    pointToLayer: (feature, latlng) => L.circleMarker(latlng, { radius: 5, color: '#2b6cb0', fillColor: '#2b6cb0', fillOpacity: 0.85 })
  });
  overlayCount++;
  layer.addTo(map);
  layersControl.addOverlay(layer, overlayCount + '. ' + name);
  if (fitToBounds){
    try { if (layer.getBounds().isValid()) map.fitBounds(layer.getBounds(), { padding: [40, 40] }); } catch (e) {}
  }
}

function parseSpatialPdf(file) {
  const reader = new FileReader();
  reader.onload = async function() {
    try {
      const typedarray = new Uint8Array(this.result);
      const pdf = await pdfjsLib.getDocument(typedarray).promise;
      let extractedFeatures = [];
      const coordRegex = /(?:E|Easting)?[:\s]*(4[0-9]{5}(?:\.[0-9]+)?)\s*[\s,;\/]\s*(?:N|Northing)?[:\s]*(5[0-9]{5}(?:\.[0-9]+)?)/gi;
      
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const textContent = await page.getTextContent();
        const pageText = textContent.items.map(item => item.str).join(" ");
        let match;
        while ((match = coordRegex.exec(pageText)) !== null) {
          const easting = parseFloat(match[1]);
          const northing = parseFloat(match[2]);
          extractedFeatures.push({
            type: "Feature",
            properties: { name: `PDF Ref: E:${easting} N:${northing}`, Source: file.name, Page: i },
            geometry: { type: "Point", coordinates: [easting, northing] }
          });
        }
      }
      if (extractedFeatures.length > 0) {
        extractedFeatures.forEach(f => {
          const projected = convertToLatLon(f.geometry.coordinates[0], f.geometry.coordinates[1]);
          if (projected) f.geometry.coordinates = [projected.lon, projected.lat];
        });
        const geojsonCollection = { type: "FeatureCollection", features: extractedFeatures };
        addOverlayLayer(`PDF: ${file.name}`, geojsonCollection);
      }
    } catch (err) { alert("Error reading PDF content: " + err.message); }
  };
  reader.readAsArrayBuffer(file);
}

function loadOverlayFile(file){
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'pdf') { parseSpatialPdf(file); }
  else if (ext === 'kml'){
    const reader = new FileReader();
    reader.onload = () => { const dom = new DOMParser().parseFromString(reader.result, 'text/xml'); addOverlayLayer(file.name, toGeoJSON.kml(dom)); };
    reader.readAsText(file);
  } else if (ext === 'geojson' || ext === 'json'){
    const reader = new FileReader();
    reader.onload = () => { addOverlayLayer(file.name, JSON.parse(reader.result)); };
    reader.readAsText(file);
  } else if (ext === 'zip'){
    const reader = new FileReader();
    reader.onload = () => { shp(reader.result).then(geojson => addOverlayLayer(file.name, geojson)); };
    reader.readAsArrayBuffer(file);
  }
} 

document.getElementById('overlay-file').addEventListener('change', (e) => {
  Array.from(e.target.files).forEach(loadOverlayFile);
  e.target.value = '';
});

const appEl = document.getElementById('app');
const isMobile = () => window.matchMedia('(max-width: 768px)').matches;
function toggleSidebar(){
  appEl.classList.toggle(isMobile() ? 'sidebar-open-mobile' : 'sidebar-collapsed-desktop');
  setTimeout(() => map.invalidateSize(), 260);
}
document.getElementById('sidebar-toggle').addEventListener('click', toggleSidebar);
document.getElementById('sidebar-backdrop').addEventListener('click', () => { appEl.classList.remove('sidebar-open-mobile'); });
